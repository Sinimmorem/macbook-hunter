<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacBook Hunter</title>

<style>
body{
font-family:Arial;
background:#080810;
color:white;
padding:20px
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer
}

input{
padding:8px;
margin:5px
}

#log{
margin-top:20px;
font-size:14px
}

.item{
margin-top:10px;
padding:10px;
background:#111;
border-radius:6px
}
</style>

</head>
<body>

<h2>MacBook Hunter</h2>

<div>
App ID<br>
<input id="appId"><br>

Cert ID<br>
<input id="certId" type="password"><br>

<button onclick="start()">ЗАПУСТИТЬ</button>
<button onclick="stop()">СТОП</button>
</div>

<div id="results"></div>

<div id="log"></div>

<script>

const PROXY = "https://macbook-hunter-proxy.sinimmorem.workers.dev/"

let timer = null
let token = null

function log(t){
document.getElementById("log").innerHTML += "<div>"+t+"</div>"
}

async function getToken(){

let appId=document.getElementById("appId").value.trim()
let certId=document.getElementById("certId").value.trim()

if(!appId||!certId){
throw new Error("Введи ключи")
}

let creds=btoa(appId+":"+certId)

let r=await fetch(PROXY,{
method:"POST",
headers:{
Authorization:"Basic "+creds,
"Content-Type":"application/x-www-form-urlencoded"
},
body:"grant_type=client_credentials&scope=https://api.ebay.com/oauth/api_scope"
})

let data=await r.json()

token=data.access_token

return token
}

async function loadItems(){

if(!token){
await getToken()
}

let url="https://api.ebay.com/buy/browse/v1/item_summary/search?q=MacBook&limit=10"

let r=await fetch(PROXY+encodeURIComponent(url),{
headers:{
Authorization:"Bearer "+token,
"X-EBAY-C-MARKETPLACE-ID":"EBAY_US"
}
})

let data=await r.json()

let html=""

if(data.itemSummaries){
data.itemSummaries.forEach(i=>{
html+=`
<div class="item">
<b>${i.title}</b><br>
$${i.price.value}<br>
<a href="${i.itemWebUrl}" target="_blank">открыть</a>
</div>
`
})
}

document.getElementById("results").innerHTML=html

}

async function start(){

log("запуск...")

await loadItems()

timer=setInterval(loadItems,60000)

}

function stop(){

clearInterval(timer)

log("остановлено")

}

</script>

</body>
</html>
